<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Property Edit</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #FAFAFA;
  --section: #F0F2F5;
  --text: #1F2933;
  --accent: #3A7CA5;
  --cta: #1F2933;
  --tagline: #4B5563;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

header, section {
  max-width: 1100px;
  margin: auto;
  padding: 80px 20px;
}

h1, h2 { font-family: 'Playfair Display', serif; }

.tagline { color: var(--tagline); }

.cta {
  display: inline-block;
  padding: 12px 25px;
  background: var(--cta);
  color: white;
  border-radius: 6px;
}

.cta:hover { background: var(--accent); }

.alt { background: var(--section); border-radius: 12px; }

.grid { display: grid; gap: 40px; margin-top: 40px; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.price { color: var(--accent); font-weight: bold; }

@media (max-width:900px){
.grid-3{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Professional Welcome Packs & Staff Handbooks</h1>
<p class="tagline">Save hours answering guest questions and run your property like a pro.</p>
<a href="#contact" class="cta">Get Your Pack</a>
</header>

<section class="alt">
<h2>Our Services</h2>
<div class="grid grid-3">
<div class="card"><h3>Welcome Pack</h3><p class="price">£45</p></div>
<div class="card"><h3>Staff Handbook</h3><p class="price">£95</p></div>
<div class="card"><h3>Bundle</h3><p class="price">£120</p></div>
</div>
</section>

<section id="contact">
<h2>Contact</h2>
<a href="#" class="cta">WhatsApp</a>
</section>

</body>
</html>
